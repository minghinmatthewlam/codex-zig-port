name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Zig 0.16.0
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check build.zig src/*.zig

      - name: Check Python smoke scripts
        run: python3 -m py_compile scripts/app_server_stdio_smoke.py scripts/cli_smoke.py scripts/tui_e2e.py

      - name: Run unit tests
        run: zig build test

      - name: Run product smoke tests
        run: zig build e2e
