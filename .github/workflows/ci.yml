name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Zig 0.16.0
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Zig
        shell: bash
        run: |
          set -euo pipefail
          zig_version="0.16.0"
          case "$(uname -m)" in
            arm64) zig_arch="aarch64" ;;
            x86_64) zig_arch="x86_64" ;;
            *)
              echo "unsupported macOS architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          zig_root="$RUNNER_TEMP/zig"
          zig_archive="$RUNNER_TEMP/zig-${zig_arch}-macos-${zig_version}.tar.xz"
          curl --fail --location --retry 3 --output "$zig_archive" \
            "https://ziglang.org/download/${zig_version}/zig-${zig_arch}-macos-${zig_version}.tar.xz"
          mkdir -p "$zig_root"
          tar -xJf "$zig_archive" --strip-components=1 -C "$zig_root"
          echo "$zig_root" >> "$GITHUB_PATH"
          "$zig_root/zig" version

      - name: Check formatting
        run: zig fmt --check build.zig build.zig.zon src/*.zig

      - name: Check Python smoke scripts
        run: python3 -m py_compile scripts/app_server_stdio_smoke.py scripts/cli_smoke.py scripts/tui_e2e.py

      - name: Build executable
        run: zig build

      - name: Run unit tests
        run: zig build test

      - name: Run product smoke tests
        run: zig build e2e
